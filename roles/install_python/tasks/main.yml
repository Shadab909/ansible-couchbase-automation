- hosts: all
  become: yes
  gather_facts: no

  tasks:
    - name: Get OS ID
      raw: grep ^ID_LIKE= /etc/os-release | cut -d= -f2
      register: os_id

    - name: Install Python & Pip on Debian
      raw: test -e /usr/bin/python3 || apt-get update -y && apt-get install -y python3 python3-pip
      when: os_id.stdout in ["ubuntu", "debian"]

    - name: Install Python & Pip on RHEL
      raw: test -e /usr/bin/python3 || (yum install -y python3 python3-pip || dnf install -y python3 python3-pip)
      when: os_id.stdout in ["centos", "rhel", "fedora", "amzn"]